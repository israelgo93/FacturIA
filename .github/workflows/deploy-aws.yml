name: Deploy to AWS App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: facturia

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify ECR registry
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "ECR_REGISTRY=$ECR_REGISTRY"
          echo "ECR_REPOSITORY=$ECR_REPOSITORY"
          if [ -z "$ECR_REGISTRY" ]; then
            echo "ERROR: ECR_REGISTRY is empty"
            exit 1
          fi

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BUILD_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          BUILD_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          BUILD_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          BUILD_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BUILD_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BUILD_GOOGLE_AI_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          BUILD_STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          BUILD_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          BUILD_STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          BUILD_STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
          BUILD_STRIPE_PRICE_PROFESSIONAL: ${{ secrets.STRIPE_PRICE_PROFESSIONAL }}
          BUILD_STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
        run: |
          set -ex
          echo "Building image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="$BUILD_SUPABASE_URL" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$BUILD_SUPABASE_ANON_KEY" \
            --build-arg NEXT_PUBLIC_APP_URL="$BUILD_APP_URL" \
            --build-arg NEXT_PUBLIC_APP_NAME=facturIA \
            --build-arg RESEND_API_KEY="$BUILD_RESEND_API_KEY" \
            --build-arg GEMINI_API_KEY="$BUILD_GEMINI_API_KEY" \
            --build-arg GOOGLE_GENERATIVE_AI_API_KEY="$BUILD_GOOGLE_AI_KEY" \
            --build-arg STRIPE_SECRET_KEY="$BUILD_STRIPE_SECRET_KEY" \
            --build-arg STRIPE_PUBLISHABLE_KEY="$BUILD_STRIPE_PUBLISHABLE_KEY" \
            --build-arg STRIPE_WEBHOOK_SECRET="$BUILD_STRIPE_WEBHOOK_SECRET" \
            --build-arg STRIPE_PRICE_STARTER="$BUILD_STRIPE_PRICE_STARTER" \
            --build-arg STRIPE_PRICE_PROFESSIONAL="$BUILD_STRIPE_PRICE_PROFESSIONAL" \
            --build-arg STRIPE_PRICE_ENTERPRISE="$BUILD_STRIPE_PRICE_ENTERPRISE" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
